name: Trakr Production Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: trakr-production-smoke
  cancel-in-progress: false

jobs:
  production-smoke:
    name: production-smoke (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: orchestration
            script: smoke:orchestration:production
          - suite: service-1
            script: smoke:service1:production
          - suite: service-2
            script: smoke:service2:production
          - suite: service-3
            script: smoke:service3:production
    env:
      SMOKE_BASE_URL: https://trakr-production-c70e.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.script }}
